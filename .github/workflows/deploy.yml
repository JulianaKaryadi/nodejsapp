name: Node.js CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/nodejsapp
            git fetch origin main
            git reset --hard origin/main
            npm ci --production
            pm2 delete my-app || true
            NODE_ENV=production pm2 start server.js --name "my-app"
            pm2 save
